title: Node.js v21.7.3 Downloaded by Non-Developer User
id: 1d2e3f4a-5b6c-7d8e-9f0a-1b2c3d4e5f6a
status: experimental
level: medium
description: |
  Detects download of Node.js v21.7.3 from nodejs.org by user context
  that is unlikely to be a developer. In Case 3, command code 'JS=2'
  in config.cfg triggered this download as part of BYOI cascade.
references:
  - https://attack.mitre.org/techniques/T1105/
logsource:
  product: zeek
  service: http
detection:
  selection:
    method: GET
    host|contains: 'nodejs.org'
    uri|contains: 'v21.7.3'
  condition: selection
falsepositives:
  - Actual Node.js developers
fields:
  - src_ip
  - host
  - uri
  - user_agent
tags:
  - attack.command_and_control
  - attack.t1105
  - case3_2025-06-13

---
title: HTTP POST to Cloudflare-fronted Domain with Octet-Stream and No User-Agent
id: 6f5e4d3c-2b1a-0f9e-8d7c-6b5a4f3e2d1c
status: experimental
level: high
description: |
  Detects HTTP POST traffic to Cloudflare-fronted domains (104.21.0.0/16)
  with no User-Agent and application/octet-stream Content-Type.
  Characteristic pattern of case3 RAT beacon.
references:
  - https://attack.mitre.org/techniques/T1071/001/
logsource:
  product: zeek
  service: http
detection:
  selection_method:
    method: POST
  selection_ip:
    dest_ip|startswith: '104.21.'
  selection_no_ua:
    user_agent: ''
  selection_ct:
    request_content_type|contains: 'application/octet-stream'
  condition: selection_method and selection_ip and (selection_no_ua or selection_ct)
falsepositives:
  - Some monitoring/agent traffic may match
fields:
  - src_ip
  - dest_ip
  - host
  - uri
  - method
tags:
  - attack.command_and_control
  - attack.t1071.001
  - case3_2025-06-13
