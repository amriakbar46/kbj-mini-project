title: c2.exe Launcher Execution from Suspicious APPDATA Path
id: 7b9c8d2e-1f3a-4b5c-6d7e-8f9a0b1c2d3e
status: experimental
level: high
description: |
  Detects c2.exe (SHA256 1206473a7c...) launcher running from
  %APPDATA%\<random>\ path. In Case 3, this launcher was located at
  %APPDATA%\afUGkp\c2.exe and used to invoke php.exe with config.cfg.
references:
  - Internal: c2.exe hash from forensic bundle
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|contains:
      - '\AppData\Roaming\'
    Image|endswith:
      - '\c2.exe'
  condition: selection
falsepositives:
  - Unknown (very specific path pattern)
fields:
  - User
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
tags:
  - attack.execution
  - attack.t1059
  - case3_2025-06-13

---
title: Registry Run Key Persistence Set to php.exe with config.cfg Argument
id: 4e5f6a7b-8c9d-0e1f-2a3b-4c5d6e7f8a9b
status: experimental
level: high
description: |
  Detects persistence via HKCU\Software\Microsoft\Windows\CurrentVersion\Run
  with value pointing to php.exe with config.cfg or similar RAT script argument.
  In Case 3, function UrHlx() in config.cfg did this via 'reg add' command.
references:
  - https://attack.mitre.org/techniques/T1547/001/
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    EventType: SetValue
    TargetObject|endswith:
      - '\Software\Microsoft\Windows\CurrentVersion\Run\*'
    TargetObject|contains: 'HKCU'
  detail_filter:
    Details|contains:
      - 'php.exe'
      - 'config.cfg'
      - 'c2.exe'
  condition: selection and detail_filter
falsepositives:
  - Developer tools that legitimately use php.exe in Run key
fields:
  - TargetObject
  - Details
  - User
tags:
  - attack.persistence
  - attack.t1547.001
  - case3_2025-06-13

---
title: PowerShell DownloadString with Invoke-Expression (Initial Stager Pattern)
id: 2a3b4c5d-6e7f-8a9b-0c1d-2e3f4a5b6c7d
status: experimental
level: high
description: |
  Detects PowerShell process creating Net.WebClient with DownloadString
  and Invoke-Expression (iex) usage in same command line. Common pattern
  in case3 initial stager from compromised truglomedspa.com.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
logsource:
  product: windows
  category: process_creation
detection:
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_downloadstring:
    CommandLine|contains:
      - 'DownloadString'
      - 'DownloadFile'
      - 'DownloadData'
  selection_iex:
    CommandLine|contains:
      - 'Invoke-Expression'
      - 'iex'
  condition: selection_powershell and selection_downloadstring and selection_iex
falsepositives:
  - Penetration testing
  - Sysadmin scripts
fields:
  - User
  - Image
  - CommandLine
  - ParentImage
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1105
  - case3_2025-06-13

---
title: Suspicious Shortcut (.lnk) in Startup Folder
id: 9c8d7e6f-5a4b-3c2d-1e0f-9a8b7c6d5e4f
status: experimental
level: medium
description: |
  Detects newly-created .lnk files in Startup folders pointing to
  executables in %APPDATA% paths. In Case 3, ycBFVIbLl.lnk was placed
  in Startup folder pointing to %APPDATA%\afUGkp\c2.exe.
references:
  - https://attack.mitre.org/techniques/T1547/009/
logsource:
  product: windows
  category: file_event
detection:
  selection:
    TargetFilename|endswith:
      - '\Start Menu\Programs\Startup\*.lnk'
    TargetFilename|contains:
      - '\AppData\'
  condition: selection
falsepositives:
  - Some legitimate apps install Startup shortcuts
fields:
  - TargetFilename
  - User
  - Image
tags:
  - attack.persistence
  - attack.t1547.009
  - case3_2025-06-13

