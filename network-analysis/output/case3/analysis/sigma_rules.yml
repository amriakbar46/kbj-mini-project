# Sigma rules for Case 3 (2025-06-13) PHP-based RAT with BYOI staging
# Compatible with SIEM backends: Splunk, Elastic, Microsoft Sentinel, etc.
# Author: re-analysis 2026-06-21

title: PHP Interpreter Executed from APPDATA Path (BYOI Indicator)
id: 8a3b1c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: experimental
level: high
description: |
  Detects php.exe being executed from non-standard %APPDATA% path.
  In Case 3 (2025-06-13), PHP 8 interpreter was downloaded via BYOI
  to %APPDATA%\php\php.exe (SHA256 b0c32fba...) and used to run config.cfg.
references:
  - https://attack.mitre.org/techniques/T1127/
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\php.exe'
      - '\php-win.exe'
      - '\php-cgi.exe'
  filter_appdata:
    Image|contains:
      - '\AppData\Roaming\'
      - '\AppData\Local\'
  condition: selection and filter_appdata
falsepositives:
  - Developer machines with PHP in custom location
fields:
  - User
  - Image
  - CommandLine
  - ParentImage
tags:
  - attack.defense_evasion
  - attack.t1127
  - case3_2025-06-13

